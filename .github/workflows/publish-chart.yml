name: Release Helm Chart

on:
  release:
    types:
      - published
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
    types: [labeled, opened, synchronize, reopened]

jobs:
  publish-chart:
    name: Package and publish Helm chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ok-to-charts')) ||
      (github.event_name == 'release' && github.event.action == 'published')
    steps:
      - name: Clone the code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin

      - name: Install yq
        run: |
          curl -fsSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod a+x /usr/local/bin/yq

      - name: Determine chart version
        id: chart_version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            # Use tag version (strip 'v' prefix)
            CHART_VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # Get the latest tag
            LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || echo "v0.0.0")
            # Strip 'v' prefix
            VERSION="${LATEST_TAG#v}"
            # Remove prerelease/build metadata
            BASE_VERSION="${VERSION%%-*}"
            BASE_VERSION="${BASE_VERSION%%+*}"
            # Parse base version
            MAJOR=$(echo $BASE_VERSION | cut -d. -f1)
            MINOR=$(echo $BASE_VERSION | cut -d. -f2)
            PATCH=$(echo $BASE_VERSION | cut -d. -f3)
            # Increment patch version
            NEXT_PATCH=$((PATCH + 1))
            # Get timestamp and short SHA
            TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            # Format: major.minor.patch+1-timestamp-sha
            CHART_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-${TIMESTAMP}-${SHORT_SHA}"
          fi
          echo "version=$CHART_VERSION" >> $GITHUB_OUTPUT
          echo "📦 Chart version: $CHART_VERSION"

      - name: Set container image tag
        run: |
          IMAGE_TAG=sha-$(echo ${{ github.sha }} | cut -c1-7)
          yq -i '.manager.image.repository = "ghcr.io/cobaltcore-dev/metal-credential-sync"' dist/chart/values.yaml
          yq -i '.manager.image.tag = "'$IMAGE_TAG'"' dist/chart/values.yaml

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Update Helm chart dependencies
        run: |
          helm dependency update dist/chart

      - name: Package Helm chart with CRDs in templates
        run: |
          helm package dist/chart --version ${{ steps.chart_version.outputs.version }}-crds

      - name: Move CRDs to crds folder
        run: |
          mkdir -p dist/chart/crds
          kustomize build config/crd | yq ea 'select(.kind == "CustomResourceDefinition")' > dist/chart/crds/crds.yaml
          rm -rf dist/chart/templates/crd

      - name: Package Helm chart without CRDs in templates
        run: |
          helm package dist/chart --version ${{ steps.chart_version.outputs.version }}

      - name: Push Helm charts to GHCR
        if: |
          github.event_name != 'pull_request' ||
          contains(github.event.pull_request.labels.*.name, 'ok-to-charts')
        run: |
          helm push metal-credential-sync-${{ steps.chart_version.outputs.version }}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
          helm push metal-credential-sync-${{ steps.chart_version.outputs.version }}-crds.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
